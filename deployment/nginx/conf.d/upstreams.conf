# Backend upstream。
# 当前推荐部署：后端运行在宿主机 18000 端口，Nginx 运行在容器内，
# 通过 host.docker.internal 回源宿主机。
# 若前后端拆分部署，将 server 改为后端服务域名或服务发现地址。
upstream actor_manager_backend {
    zone actor_manager_backend 64k;
    least_conn;
    server host.docker.internal:18000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

# MinIO upstream。
# 浏览器通过 Nginx 同域访问 /minio/，Nginx 容器回源宿主机 9000 端口。
upstream actor_manager_minio {
    zone actor_manager_minio 64k;
    server host.docker.internal:9000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# 每个源 IP 的认证接口限流，防止暴力登录。
limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=20r/m;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # 前端打包目录。部署时将 frontend/dist 挂载到该目录。
    root /srv/actor-manager/frontend-dist;
    index index.html;

    # 统一的安全响应头。
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Nginx 自身健康检查。
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # 登录与注册接口限流，避免恶意请求打满后端。
    location = /api/auth/login {
        limit_req zone=auth_per_ip burst=20 nodelay;
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://actor_manager_backend;
    }

    location = /api/auth/register {
        limit_req zone=auth_per_ip burst=20 nodelay;
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://actor_manager_backend;
    }

    # 后端 API（上传、风格生成、协议管理、发现广场等）。
    location ^~ /api/ {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://actor_manager_backend;
    }

    # 静态资源长缓存（Vite 构建产物带 hash，可安全缓存）。
    location ^~ /assets/ {
        try_files $uri =404;
        expires 30d;
        access_log off;
    }

    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
        log_not_found off;
        expires 7d;
    }

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    # SPA history 路由回退。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 不缓存，避免前端发布后用户拿到旧入口文件。
    location = /index.html {
        try_files $uri =404;
        expires -1;
    }
}

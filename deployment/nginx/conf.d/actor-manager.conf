# 每个源 IP 的认证接口限流，防止暴力登录。
limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=20r/m;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Nginx 自身健康检查；保留 HTTP 端口可用，便于基础连通性巡检。
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # 除健康检查外，统一升级到 HTTPS。
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # 证书文件由部署脚本挂载到 /etc/nginx/certs。
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # 前端打包目录。部署时将 frontend/dist 挂载到该目录。
    root /srv/actor-manager/frontend-dist;
    index index.html;

    # 统一的安全响应头。
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Nginx 自身健康检查。
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # 登录与注册接口限流，避免恶意请求打满后端。
    location = /api/auth/login {
        limit_req zone=auth_per_ip burst=20 nodelay;
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://actor_manager_backend;
    }

    location = /api/auth/register {
        limit_req zone=auth_per_ip burst=20 nodelay;
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://actor_manager_backend;
    }

    # 后端 API（上传、风格生成、协议管理、发现广场等）。
    location ^~ /api/ {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://actor_manager_backend;
    }

    # MinIO 对象访问与浏览器直传入口。
    # 后端按 minio.endpoint=localhost:9000 生成预签名 URL，并通过
    # minio.public_base_url=/minio 返回给前端；这里去掉 /minio 前缀后回源。
    # Host 必须与后端签名时的 MinIO endpoint 一致，否则预签名 URL 会失效。
    location ^~ /minio/ {
        proxy_http_version 1.1;
        proxy_set_header Host localhost:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Trace-Id $proxy_trace_id;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
        proxy_buffering off;

        proxy_pass http://actor_manager_minio/;
    }

    # 静态资源长缓存（Vite 构建产物带 hash，可安全缓存）。
    location ^~ /assets/ {
        try_files $uri =404;
        expires 30d;
        access_log off;
    }

    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
        log_not_found off;
        expires 7d;
    }

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    # SPA history 路由回退。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 不缓存，避免前端发布后用户拿到旧入口文件。
    location = /index.html {
        try_files $uri =404;
        expires -1;
    }
}
